# Nixpacks configuration to pin Node.js version
# Nixpacks only supports major version specification (e.g., 22.x)
# To pin a specific minor/patch version, we override the nixpkgs archive
# This commit from nixpkgs provides Node.js 22.13.1 (stable)
# See: https://github.com/NixOS/nixpkgs
# Note: Unstable commits may not be compatible with Nixpacks
# Alternative commits:
# - bf744fe90419885eefced41b3e5ae442d732712d → Node 22.x versions
providers = ['node']

[phases.setup]
nixpkgsArchive = '51ad838b03a05b1de6f9f2a0fffecee64a9788ee'
